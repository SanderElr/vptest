<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ЗОНА 1988: Build v16.12.16</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/SanderElr/vptest/main/favicon.png">
  <style>
    body{background:#0a0a0a;color:#d4c4a8;font-family:monospace;margin:0;padding:10px;display:flex;justify-content:center}
    .container{display:grid;grid-template-columns:320px 1fr;gap:15px;max-width:1300px;width:100%}
    .sidebar{display:flex;flex-direction:column;gap:10px;height:95vh}
    
    /* ЧАТ И ИНТЕРФЕЙС */
    #auth-container { background: #1a1a1a; border: 1px solid #444; padding: 12px; }
    #user-info { display: none; margin-top: 10px; }
    #nick-input { background: #000; border: 1px solid #444; color: #6f6; width: 100%; padding: 5px; font-family: monospace; outline: none; }
    .chat-box { background: #000; border: 1px solid #333; display: flex; flex-direction: column; flex: 1; min-height: 400px; overflow: hidden; }
    #chat-messages { flex: 1; overflow-y: auto; font-size: 12px; padding: 10px; border-bottom: 1px solid #222; background: #050505; }
    .chat-msg { margin-bottom: 8px; border-bottom: 1px solid #111; padding: 6px; word-break: break-word; border-left: 3px solid transparent; }
    .chat-name { color: #fd6; font-weight: bold; cursor: pointer; text-decoration: underline dotted; }
    .chat-name-self { color: #00ff00 !important; font-weight: bold; cursor: pointer; }
    .chat-msg-highlight { background: #1a1a1a !important; border-left-color: #00ff00; }
    .chat-msg-mention-alt { border-left-color: #fd6 !important; }
    .chat-input-row { display: flex; background: #111; height: 40px; }
    #chat-input { background: #000; border: none; color: #6f6; flex: 1; padding: 0 10px; font-family: monospace; outline: none; }
    #chat-send { background: #222; border: none; color: #6f6; width: 50px; cursor: pointer; }

    /* ГЕЙМПЛЕЙ */
    .game-panel { background: #111; padding: 20px; border: 1px solid #444; overflow-y: auto; height: 95vh; box-sizing: border-box; }
    .time-weather-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; font-size: 11px; background: #1a1a1a; padding: 10px; border: 1px solid #333; border-bottom: 2px solid #555; }
    .tw-item { color: #888; }
    .tw-val { color: #fff; font-weight: bold; float: right; }

    .top-panel { display: flex; gap: 10px; margin-bottom: 15px; align-items: stretch; }
    .loc-header { background: #222; padding: 10px 15px; border: 1px solid #444; border-left: 5px solid #f44; display: flex; align-items: center; justify-content: center; min-width: 140px; }
    .loc-name { font-size: 14px; color: #fff; font-weight: bold; text-transform: uppercase; }
    .radio-text { flex: 1; background: #050505; border: 1px solid #333; color: #6a9c6a; font-size: 12px; padding: 10px; display: flex; align-items: center; font-style: italic; min-height: 45px;}

    .log-row { display: flex; gap: 10px; height: 200px; margin-bottom: 15px; }
    #log { flex: 1; overflow-y: auto; background: #000; border: 1px solid #333; padding: 10px; font-size: 12px; color: #ccc; }
    #loc-img { width: 200px; height: 200px; background: #050505; border: 1px solid #444; background-size: cover; background-position: center; image-rendering: pixelated; }

    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 15px; }
    .s-item { background: #050505; border: 1px solid #333; padding: 10px 2px; text-align: center; border-bottom: 2px solid #444; }
    .s-val { font-size: 12px; font-weight: bold; color: #fff; display: block; margin-top: 4px;}
    
    .title { color: #555; border-bottom: 1px solid #333; margin: 25px 0 10px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    
    .inv-inline { background: #0a0a0a; padding: 10px; border: 1px solid #222; font-size: 12px; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 12px; color: #6f6; min-height: 40px;}
    .inv-clickable { cursor: pointer; border-bottom: 1px dotted #6f6; padding: 2px 4px; transition: background 0.2s; }
    .inv-clickable:hover { background: #1a3a1a; color: #fff; }
    
    button { background: #1a1a1a; color: #d4c4a8; border: 1px solid #444; padding: 12px; cursor: pointer; font-family: monospace; text-align: left; outline: none; }
    button:hover:not(:disabled) { background: #252525; border-color: #6f6; }
    button:disabled { opacity: 0.3; cursor: not-allowed; color: #555; }

    /* МОДАЛКА АРХИВА */
    #archive-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; box-sizing: border-box; }
    .archive-content { max-width: 800px; margin: 0 auto; background: #111; border: 1px solid #444; height: 90vh; display: flex; flex-direction: column; }
    .archive-header { padding: 15px; background: #222; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; }
    #archive-list { flex-grow: 1; overflow-y: auto; padding: 20px; font-size: 13px; color: #ccc; }
  </style>
</head>
<body>

  <div class="container">
    <div class="sidebar">
      <div style="background: #1a1a1a; border: 1px solid #444; padding: 10px; display: flex; align-items: center; justify-content: space-between;">
        <span style="font-size: 10px; color: #888;">СИГНАЛ:</span>
        <button id="music-toggle" style="padding: 5px 10px; font-size: 10px; background: #222; color: #f66; border: 1px solid #444; cursor: pointer;">[ ВЫКЛ ]</button>
      </div>
      <audio id="bg-music" loop><source src="mus.mp3" type="audio/mpeg"></audio>

      <div id="auth-container">
        <button id="login-btn" style="width:100%; text-align:center;">🔑 ВХОД В СИСТЕМУ</button>
        <div id="user-info">
          <div style="font-size: 10px; color: #888; margin-bottom:4px;">ПОЗЫВНОЙ:</div>
          <input type="text" id="nick-input" maxlength="15" placeholder="Ваш ник...">
        </div>
      </div>
      
      <div class="chat-box">
        <div id="chat-messages"></div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="Передача..." maxlength="100">
          <button id="chat-send">▶</button>
        </div>
      </div>
      <button onclick="window.openArchive()" style="width:100%; font-size:10px; text-align:center; background:#111;">📜 АРХИВ ПЕРЕГОВОРОВ</button>
    </div>

    <div class="game-panel">
      <div class="time-weather-panel">
        <div class="tw-item">📅 Дата: <span class="tw-val" id="display-date">26.12.1988</span></div>
        <div class="tw-item">☁️ Погода: <span class="tw-val" id="display-weather">...</span></div>
        <div class="tw-item">🕒 Время: <span class="tw-val" id="display-time">08:00</span></div>
        <div class="tw-item">🌓 Фаза: <span class="tw-val" id="display-phase">Утро</span></div>
      </div>

      <div class="top-panel">
        <div class="loc-header"><span class="loc-name" id="cur-loc-name">...</span></div>
        <div id="radio-display" class="radio-text">ПОИСК СИГНАЛА...</div>
      </div>
      
      <div class="stats-grid" id="stats"></div>
      
      <div class="log-row">
        <div id="log"></div>
        <div id="loc-img"></div>
      </div>
      
      <div class="title">🎒 ВЕЩИ (Клик — использовать)</div>
      <div id="inventory" class="inv-inline"></div>
      
      <div class="title">🛠️ СБОРКА И ГОТОВКА</div>
      <div id="cook-actions" class="grid-2"></div>
      
      <div class="title">📍 ДЕЙСТВИЯ (1 ЧАС)</div>
      <div id="local-actions" class="grid-2"></div>
      
      <div class="title">🗺️ ПЕРЕХОД (3 ЧАСА)</div>
      <div id="move-actions" class="grid-2"></div>
      
      <button style="width:100%; margin-top:40px; background:#300; color:#f66; border:1px solid #600; text-align:center" onclick="resetGame()">[ СБРОС ДАННЫХ ]</button>
    </div>
  </div>

  <div id="archive-modal">
    <div class="archive-content">
      <div class="archive-header"><span style="color:#6f6;">АРХИВ</span><button onclick="window.closeArchive()">[ X ]</button></div>
      <div id="archive-list"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script src="world.js"></script>
  <script src="recipes.js"></script>
  <script src="radio.js"></script>
  <script src="events.js"></script>

  <script>
    const firebaseConfig = { apiKey: "AIzaSyBeCXQduKrz67Cs1SnqFFEktxAaaYNfFho", authDomain: "vptest1-6a89d.firebaseapp.com", projectId: "vptest1-6a89d", appId: "1:452937918921:web:739b70ad20075896a1e018" };
    firebase.initializeApp(firebaseConfig);
    window.auth = firebase.auth();
    window.db = firebase.firestore();
    window.$ = id => document.getElementById(id);
    window.currentUser = null;
    window.S = null;

    // --- МУЗЫКА ---
    const bgMusic = $('bg-music');
    const musicBtn = $('music-toggle');
    bgMusic.volume = 0.4;
    
    musicBtn.onclick = () => {
      if (bgMusic.paused) {
        bgMusic.play();
        musicBtn.textContent = "[ ВКЛ ]"; musicBtn.style.color = "#6f6";
        localStorage.setItem('zone_music', 'on');
      } else {
        bgMusic.pause();
        musicBtn.textContent = "[ ВЫКЛ ]"; musicBtn.style.color = "#f66";
        localStorage.setItem('zone_music', 'off');
      }
    };

    // --- ЧАТ (ИЗ 16.12.6) ---
    let chatUnsub = null;
    window.startChat = function() {
      if (chatUnsub) chatUnsub();
      chatUnsub = db.collection('messages').orderBy('createdAt', 'asc').limitToLast(25).onSnapshot(snap => {
        const myNick = $('nick-input').value.trim();
        const chatContainer = $('chat-messages');
        chatContainer.innerHTML = '';
        snap.forEach(doc => {
          const m = doc.data(); if (!m.name) return;
          const isItMe = (myNick && m.name.trim() === myNick);
          const isMentioned = (myNick && m.text.includes(`@${myNick}`));
          let msgClasses = "chat-msg";
          if (isItMe || isMentioned) msgClasses += " chat-msg-highlight";
          if (isMentioned && !isItMe) msgClasses += " chat-msg-mention-alt";
          chatContainer.innerHTML += `<div class="${msgClasses}"><span class="${isItMe?'chat-name-self':'chat-name'}" onclick="window.mention('${m.name.trim()}')">${m.name}:</span> <span>${m.text}</span></div>`;
        });
        chatContainer.scrollTop = chatContainer.scrollHeight;
      });
    };

    window.sendChatMsg = function() {
      const input = $('chat-input');
      const text = input.value.trim();
      const nick = $('nick-input').value.trim() || currentUser.displayName.split(' ')[0];
      if (text && currentUser) {
        db.collection('messages').add({ name: nick, text: text, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        input.value = '';
      }
    };

    window.mention = n => { const i = $('chat-input'); i.value = `@${n}, ${i.value}`; i.focus(); };
    window.openArchive = () => {
      $('archive-modal').style.display='block';
      db.collection('messages').orderBy('createdAt', 'desc').limit(100).get().then(snap => {
        $('archive-list').innerHTML = snap.docs.map(doc => {
          const m = doc.data(); return `<div style="padding:5px; border-bottom:1px solid #222;"><b>${m.name}:</b> ${m.text}</div>`;
        }).join('');
      });
    };
    window.closeArchive = () => $('archive-modal').style.display='none';

    // --- ГЕЙМПЛЕЙ ---
    window.ui = function() {
      if(!S) return;
      const loc = window.WORLD[S.loc] || window.WORLD.home;
      const startDay = new Date(1988, 11, 26);
      const currDate = new Date(startDay.getTime() + (S.totalHours * 3600000));
      const h = currDate.getHours();
      
      $('display-date').textContent = currDate.toLocaleDateString('ru-RU');
      $('display-time').textContent = (h < 10 ? '0'+h : h) + ':00';
      
      let ph = window.GAME_EVENTS.dayPhases.day;
      if (h < 6) ph = window.GAME_EVENTS.dayPhases.night;
      else if (h < 12) ph = window.GAME_EVENTS.dayPhases.morning;
      else if (h >= 18) ph = window.GAME_EVENTS.dayPhases.evening;
      
      $('display-phase').textContent = ph.n;
      $('display-weather').textContent = window.GAME_EVENTS.weather[S.weatherId].n;
      $('cur-loc-name').textContent = loc.n;
      $('radio-display').textContent = window.getRandomRadioMessage ? window.getRandomRadioMessage() : "...";
      $('loc-img').style.backgroundImage = `url('${loc.img}')`;
      
      $('stats').innerHTML = [['❤️', S.hp], ['🍞', S.food], ['💧', S.water], ['⚡', S.energy], ['🧠', S.psy], ['☢️', S.rad]].map(s=>`<div class="s-item"><span>${s[0]}</span><span class="s-val">${s[1]}</span></div>`).join('');
      
      const invItems = [{id:'fish', icon:'🐟', edible:true}, {id:'water_res', icon:'💧', edible:true}, {id:'wood', icon:'🪵'}, {id:'rags', icon:'🧵'}, {id:'batteries', icon:'🔋'}];
      $('inventory').innerHTML = invItems.map(i => S[i.id] > 0 ? `<span class="${i.edible?'inv-clickable':''}" onclick="${i.edible?`doAction('use_${i.id}')`:''}">${i.icon} ${S[i.id]}</span>` : '').join(' ');

      let craftHtml = '';
      if(window.RECIPES) {
        Object.entries(window.RECIPES.craft).forEach(([id, r]) => { craftHtml += `<button ${!canCraft(id,'craft')?'disabled':''} onclick="applyRecipe('${id}','craft')">${r.n}</button>`; });
        if (S.loc==='home') Object.entries(window.RECIPES.cooking).forEach(([id, r]) => { craftHtml += `<button ${!canCraft(id,'cooking')?'disabled':''} onclick="applyRecipe('${id}','cooking')">${r.n}</button>`; });
      }
      $('cook-actions').innerHTML = craftHtml;
      $('local-actions').innerHTML = Object.entries(loc.acts).map(([id, n])=>`<button onclick="doAction('${id}')">${n}</button>`).join('');
      $('move-actions').innerHTML = Object.keys(window.WORLD).map(id=>`<button ${id===S.loc?'disabled':''} onclick="moveTo('${id}')">${window.WORLD[id].n}</button>`).join('');
    };

    window.doAction = function(a) {
      if (a === 'use_fish') { if (S.fish > 0) { S.fish--; S.food = Math.min(100, S.food + 15); log("🐟 Съедена рыба."); } } 
      else if (a === 'use_water_res') { if (S.water_res > 0) { S.water_res--; S.water = Math.min(100, S.water + 30); log("💧 Выпита вода."); } }
      else if (a === 'rest') {
        let hrs = Math.ceil((100 - S.energy) / 10);
        for(let i=0; i<hrs; i++){ S.food=Math.max(0,S.food-2); S.water=Math.max(0,S.water-3); S.hp=Math.min(100,S.hp+2); S.psy=Math.min(100,S.psy+5); }
        S.energy=100; S.totalHours+=hrs; log(`💤 Сон: ${hrs}ч.`);
      } else {
        S.totalHours+=1;
        if(a==='scavenge_rags') S.rags++; else if(a==='get_wood') S.wood+=2; else if(a==='fish') S.fish++; else if(a==='get_water') S.water_res++;
        log(`📍 Действие: ${a}`);
        S.food=Math.max(0,S.food-3); S.water=Math.max(0,S.water-4); S.energy=Math.max(0,S.energy-5);
      }
      if(Math.random()<0.1) S.weatherId = Math.floor(Math.random()*window.GAME_EVENTS.weather.length);
      ui(); save();
    };

    window.moveTo = function(id) {
      if(S.energy < 15) return;
      S.loc=id; S.energy-=15; S.totalHours+=3; log(`➡️ Переход в ${window.WORLD[id].n} (3 ч.)`); ui(); save();
    };

    window.applyRecipe = function(id, cat) {
      const r = window.RECIPES[cat][id]; if(!canCraft(id, cat)) return;
      Object.entries(r.res).forEach(([resId, count]) => S[resId]-=count);
      if(r.gain.food) S.food=Math.min(100, S.food+r.gain.food);
      if(r.gain.hp) S.hp=Math.min(100, S.hp+r.gain.hp);
      log(r.log); ui(); save();
    };

    window.log = (m, t='') => $('log').insertAdjacentHTML('afterbegin', `<div>[${Math.floor(S.totalHours/24)}д] ${m}</div>`);
    window.save = () => { if(currentUser && S) db.collection('survival_v12').doc(currentUser.uid).set({S}); };
    function init() { S={totalHours:8, hp:100, food:80, water:80, energy:100, psy:100, rad:0, loc:'home', fish:0, wood:5, rags:2, water_res:1, batteries:1, weatherId:0}; }
    window.resetGame = () => { if(confirm("Начать заново?")) { init(); ui(); save(); } };

    auth.onAuthStateChanged(user => {
      if(user) {
        currentUser = user; $('user-info').style.display='block'; $('login-btn').style.display='none';
        const savedNick = localStorage.getItem('zone_nick'); if (savedNick) $('nick-input').value = savedNick;
        db.collection('survival_v12').doc(user.uid).get().then(d => {
          if(d.exists) S=d.data().S; else init();
          ui(); startChat();
          if(localStorage.getItem('zone_music') === 'on') {
            window.addEventListener('click', () => { if(bgMusic.paused) { bgMusic.play(); musicBtn.textContent="[ ВКЛ ]"; musicBtn.style.color="#6f6"; } }, {once:true});
          }
        });
      }
    });

    $('chat-send').onclick = window.sendChatMsg;
    $('chat-input').onkeypress = e => { if(e.key==='Enter') window.sendChatMsg(); };
    $('nick-input').onchange = e => { localStorage.setItem('zone_nick', e.target.value); startChat(); };
    $('login-btn').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
  </script>
</body>
</html>
