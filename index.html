<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ЗОНА 1988: v16.9</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/SanderElr/vptest/main/favicon.png">
  <style>
    body{background:#0a0a0a;color:#d4c4a8;font-family:monospace;margin:0;padding:10px;display:flex;justify-content:center}
    .container{display:grid;grid-template-columns:320px 1fr;gap:15px;max-width:1300px;width:100%}
    .sidebar{display:flex;flex-direction:column;gap:10px;height:95vh}
    
    #auth-container { background: #1a1a1a; border: 1px solid #444; padding: 12px; }
    #user-info { display: none; margin-top: 10px; }
    #nick-input { background: #000; border: 1px solid #444; color: #6f6; width: 100%; padding: 5px; font-family: monospace; outline: none; }
    
    .chat-box { background: #000; border: 1px solid #333; display: flex; flex-direction: column; flex-grow: 1; min-height: 300px; }
    #chat-messages { flex-grow: 1; overflow-y: auto; font-size: 12px; padding: 10px; border-bottom: 1px solid #222;}
    
    .chat-msg { margin-bottom: 8px; border-bottom: 1px solid #111; padding: 6px; word-break: break-word; transition: background 0.3s; }
    .chat-msg-mention { background: #1a2a1a !important; border-left: 3px solid #6f6; } 
    
    .chat-name { color: #fd6; font-weight: bold; cursor: pointer; text-decoration: underline dotted; }
    .chat-name-self { color: #6f6 !important; font-weight: bold; cursor: pointer; }
    
    .chat-input-row { display: flex; background: #111; }
    #chat-input { background: #000; border: none; color: #6f6; flex-grow: 1; padding: 12px; font-family: monospace; outline: none; }
    #chat-send { background: #222; border: none; color: #6f6; padding: 0 15px; cursor: pointer; }

    .game-panel { background: #111; padding: 20px; border: 1px solid #444; overflow-y: auto; height: 95vh; box-sizing: border-box; }
    .loc-header { background: #222; padding: 15px; border: 1px solid #444; text-align: center; margin-bottom: 15px; border-left: 5px solid #f44; }
    .loc-name { font-size: 20px; color: #fff; font-weight: bold; text-transform: uppercase; }
    
    .stats-emoji { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 15px; }
    .s-item { background: #050505; border: 1px solid #333; padding: 8px 2px; text-align: center; border-radius: 4px; border-bottom: 2px solid #444; }
    .s-val { font-size: 11px; font-weight: bold; color: #fff; display: block;}
    
    .log-container { display: flex; gap: 10px; margin-bottom: 15px; align-items: stretch; }
    #log { flex-grow: 1; height: 160px; overflow-y: auto; background: #000; border: 1px solid #333; padding: 10px; font-size: 12px; color: #ccc; }
    
    .radio-img-box { width: 120px; height: 182px; background: #000; border: 1px solid #333; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #radio-visual { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; transition: all 0.3s; filter: grayscale(1); }
    .active-radio { opacity: 1.0 !important; filter: grayscale(0) !important; border-color: #6f6 !important; box-shadow: 0 0 15px rgba(0,255,0,0.4); }

    .title { color: #555; border-bottom: 1px solid #333; margin: 25px 0 10px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .inv-inline { background: #0a0a0a; padding: 10px; border: 1px solid #222; font-size: 12px; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 12px; color: #6f6; min-height: 40px;}
    
    button { background: #1a1a1a; color: #d4c4a8; border: 1px solid #444; padding: 12px; cursor: pointer; font-family: monospace; text-align: left; }
    button:hover:not(:disabled) { background: #252525; border-color: #6f6; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    #archive-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; box-sizing: border-box; }
    .archive-content { max-width: 800px; margin: 0 auto; background: #111; border: 1px solid #444; height: 90vh; display: flex; flex-direction: column; }
    .archive-header { padding: 15px; background: #222; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; }
    #archive-list { flex-grow: 1; overflow-y: auto; padding: 20px; font-size: 14px; line-height: 1.6; }
    .archive-entry { margin-bottom: 15px; padding: 10px; border-bottom: 1px solid #222; }
    .close-btn { background: #400; color: #fff; border: none; padding: 5px 15px; cursor: pointer; }

    .category-header { background: #1a1a1a; border: 1px solid #333; color: #f90; padding: 12px; margin-top: 8px; cursor: pointer; display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; }
    .category-content { display: none; padding: 10px 0; grid-template-columns: 1fr 1fr; gap: 8px; }
    .category-content.active { display: grid; }
    .recipe-btn { border-color: #f90; color: #f90; font-size: 10px; display: flex; flex-direction: column; }

    .bad { color: #f66; font-weight: bold; } .good { color: #6f6; } .warn { color: #fd6; }
    .version-footer { text-align: center; color: #333; font-size: 10px; margin-top: 20px; padding: 10px; border-top: 1px solid #1a1a1a; text-transform: uppercase; }
  </style>
</head>
<body>

  <div class="container">
    <div class="sidebar">
      <div id="auth-container">
        <button id="login-btn" style="width:100%">🔑 ВХОД GOOGLE</button>
        <div id="user-info">
          <div style="font-size: 10px; color: #888;">ПОЗЫВНОЙ:</div>
          <input type="text" id="nick-input" maxlength="15" placeholder="Твой ник...">
        </div>
      </div>
      <div class="chat-box">
        <div id="chat-messages"></div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="Связь..." maxlength="100">
          <button id="chat-send">▶</button>
        </div>
      </div>
      <button onclick="openArchive()" style="width:100%; margin-top:5px; font-size:10px; text-align:center;">📜 ОТКРЫТЬ АРХИВ ЧАТА</button>
    </div>

    <div class="game-panel">
      <div class="loc-header"><span class="loc-name" id="cur-loc-name">Загрузка...</span></div>
      <div class="stats-emoji" id="stats"></div>
      
      <div class="log-container">
        <div id="log"></div>
        <div class="radio-img-box">
          <img id="radio-visual" src="https://raw.githubusercontent.com/SanderElr/vptest/main/radio.png" alt="📻">
        </div>
      </div>
      
      <div class="title">🎒 ИНВЕНТАРЬ</div>
      <div class="inv-inline" id="inventory"></div>
      
      <div class="title">📍 ДЕЙСТВИЯ</div>
      <div class="grid-2" id="local-actions"></div>

      <div class="title">🗺️ КАРТА ПЕРЕМЕЩЕНИЙ</div>
      <div class="grid-2" id="move-actions"></div>

      <div id="crafting-section">
        <div class="title">🛠️ МАСТЕРСКАЯ</div>
        <div class="category-header" onclick="toggleCategory('cat-cooking')"><span>🍳 ГОТОВКА</span></div>
        <div id="cat-cooking" class="category-content"></div>
        <div class="category-header" onclick="toggleCategory('cat-meds')"><span>💊 МЕДИЦИНА</span></div>
        <div id="cat-meds" class="category-content"></div>
      </div>
      
      <button style="width:100%; margin-top:40px; background:#300; color:#f66; border:1px solid #600; text-align:center" onclick="resetGame()">[ НАЧАТЬ ЗАНОВО ]</button>
      <div class="version-footer">ЗОНА 1988: Build v16.9 // SanderElr</div>
    </div>
  </div>

  <div id="archive-modal">
    <div class="archive-content">
        <div class="archive-header"><span style="color:#6f6;">АРХИВ РАДИОПЕРЕГОВОРОВ</span><button class="close-btn" onclick="closeArchive()">[ ЗАКРЫТЬ ]</button></div>
        <div id="archive-list"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = { apiKey: "AIzaSyBeCXQduKrz67Cs1SnqFFEktxAaaYNfFho", authDomain: "vptest1-6a89d.firebaseapp.com", projectId: "vptest1-6a89d", appId: "1:452937918921:web:739b70ad20075896a1e018" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();
    const $ = id => document.getElementById(id);
    let currentUser = null, over = false, S = {}, chatUnsub = null;

    const WORLD = {
      home: { n:'🏠 Убежище', rad:0, actions: ['rest', 'radio'] },
      city: { n:'🏙️ Город', rad:8, actions: ['city_slums'] },
      forest: { n:'🌲 Лес', rad:5, actions: ['get_wood_fast'] }
    };

    const RECIPES = [
      { id:'fried_fish', cat:'cooking', n:'🍳 ЖАРЕНАЯ РЫБА', p:'1🐟 1🪵', check:s=>s.fish>=1 && s.wood>=1, apply:s=>{s.fish--;s.wood--;return{food:50};}},
      { id:'bandages', cat:'meds', n:'💊 БИНТЫ', p:'2🧵 1💧', check:s=>s.rags>=2 && s.water_res>=1, apply:s=>{s.rags-=2;s.water_res--;return{hp:40};}}
    ];

    function mention(name) { const i = $('chat-input'); i.value = `@${name}, ${i.value}`; i.focus(); }

    function startChat() {
      if(chatUnsub) chatUnsub();
      chatUnsub = db.collection('messages').orderBy('createdAt', 'asc').limitToLast(30).onSnapshot(snap => {
        const myNick = $('nick-input').value.trim();
        $('chat-messages').innerHTML = '';
        snap.forEach(doc => {
          const m = doc.data(); if(!m.name || !m.text) return;
          const isMention = myNick && m.text.includes(`@${myNick}`);
          const msgClass = isMention ? 'chat-msg chat-msg-mention' : 'chat-msg';
          const nameClass = (m.name === myNick) ? 'chat-name-self' : 'chat-name';
          $('chat-messages').innerHTML += `<div class="${msgClass}"><span class="${nameClass}" onclick="mention('${m.name}')">${m.name}:</span> <span>${m.text}</span></div>`;
        });
        $('chat-messages').scrollTop = $('chat-messages').scrollHeight;
      });
    }

    function ui() {
      if(!S || !S.loc) return;
      const loc = WORLD[S.loc]; $('cur-loc-name').textContent = loc.n;
      $('stats').innerHTML = [['❤️', S.hp], ['🍞', S.food], ['💧', S.water], ['⚡', S.energy], ['☢️', S.rad], ['🧠', S.psy], ['📅', S.day]].map(s=>`<div class="s-item"><span>${s[0]}</span><span class="s-val">${s[1]}</span></div>`).join('');
      const invItems = [['fish','🐟'],['wood','🪵'],['rags','🧵'],['water_res','💧'],['batteries','🔋']];
      $('inventory').innerHTML = invItems.map(i=>S[i[0]]>0?`<span>${i[1]} ${S[i[0]]}</span>`:'').join(' ');
      $('local-actions').innerHTML = loc.actions.map(a=>`<button onclick="doAction('${a}')">${a==='rest'?'💤 Сон':a==='radio'?'📻 Радио':a}</button>`).join('');
      $('move-actions').innerHTML = Object.entries(WORLD).map(([id,d])=>(`<button ${id===S.loc?'disabled':''} onclick="moveTo('${id}')">${d.n}</button>`)).join('');
      $('cat-cooking').innerHTML = RECIPES.filter(r=>r.cat==='cooking').map(r=>`<button class="recipe-btn" onclick="craft('${r.id}')"><span>${r.n}</span><span style="font-size:9px">${r.p}</span></button>`).join('');
      $('cat-meds').innerHTML = RECIPES.filter(r=>r.cat==='meds').map(r=>`<button class="recipe-btn" onclick="craft('${r.id}')"><span>${r.n}</span><span style="font-size:9px">${r.p}</span></button>`).join('');
    }

    function log(m, t='info') { $('log').insertAdjacentHTML('afterbegin', `<div class="${t}">[День ${S.day}] ${m}</div>`); }
    function updateS(k, v) { S[k] = Math.max(0, Math.min(100, (S[k]||0)+v)); if(S.hp<=0 && !over){ over=true; log("💀 СМЕРТЬ","bad");} }
    
    function doAction(a) {
      if(over) return;
      if(a==='rest'){ S.day++; updateS('hp',20); updateS('energy',100); log("💤 Отдохнул"); }
      else if(a==='radio'){ if(S.batteries>0){ S.batteries--; updateS('psy',30); $('radio-visual').classList.add('active-radio'); setTimeout(()=>$('radio-visual').classList.remove('active-radio'),3000); log("📻 Поймал сигнал");} else log("🔋 Нет батарей","bad");}
      else if(a==='city_slums'){ S.rags++; log("🧵 Нашел тряпки"); }
      else if(a==='get_wood_fast'){ S.wood+=2; log("🪵 Собрал дров"); }
      updateS('food',-5); updateS('water',-5); ui(); save();
    }

    function moveTo(id){ if(!over){ S.loc=id; updateS('energy',-10); log(`➡️ Ушел в ${WORLD[id].n}`); ui(); save(); } }
    function craft(id){ const r=RECIPES.find(x=>x.id===id); if(r && r.check(S)){ const e=r.apply(S); for(let k in e) updateS(k,e[k]); log(`🛠️ Сделал ${r.n}`,"good"); ui(); save(); } else log("🚫 Нет ресурсов","bad"); }
    function save() { if(currentUser) db.collection('survival_v12').doc(currentUser.uid).set({S, over}); }
    
    auth.onAuthStateChanged(user => { 
      if(user){ 
        currentUser=user; $('login-btn').style.display='none'; $('user-info').style.display='block';
        const n = localStorage.getItem('zone_nick'); if(n) $('nick-input').value = n;
        db.collection('survival_v12').doc(user.uid).get().then(d => { if(d.exists){ S=d.data().S; over=d.data().over; ui(); } else init(); startChat(); });
      } 
    });

    function init(){ S={day:1,hp:100,food:80,water:80,energy:100,rad:0,psy:100,loc:'home',fish:0,wood:5,rags:2,water_res:1,batteries:1}; over=false; ui(); save(); }
    function resetGame(){ if(confirm("Начать заново?")) init(); }
    $('login-btn').onclick=()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    $('chat-send').onclick=send;
    $('chat-input').onkeypress=e=>{if(e.key==='Enter')send();};
    $('nick-input').onchange=e=>{localStorage.setItem('zone_nick',e.target.value); startChat();};
    function toggleCategory(id){$(id).classList.toggle('active');}
    function send(){ const t=$('chat-input').value.trim(), n=$('nick-input').value.trim()||currentUser.displayName.split(' ')[0]; if(t && currentUser){ db.collection('messages').add({name:n,text:t,createdAt:firebase.firestore.FieldValue.serverTimestamp()}); $('chat-input').value=''; }}
    function openArchive(){ $('archive-modal').style.display='block'; const my=$('nick-input').value.trim(); db.collection('messages').orderBy('createdAt','desc').limit(50).get().then(snap=>{ $('archive-list').innerHTML=''; snap.forEach(doc=>{ const m=doc.data(); const isM=my&&m.text.includes(`@${my}`); $('archive-list').innerHTML+=`<div class="archive-entry ${isM?'chat-msg-mention':''}"><span class="chat-name" onclick="mention('${m.name}');closeArchive()">${m.name}:</span> ${m.text}</div>`; }); }); }
    function closeArchive(){$('archive-modal').style.display='none';}
  </script>
</body>
</html>
