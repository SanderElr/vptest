<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ЗОНА 1988: v16.11</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/SanderElr/vptest/main/favicon.png">
  <style>
    body{background:#0a0a0a;color:#d4c4a8;font-family:monospace;margin:0;padding:10px;display:flex;justify-content:center}
    .container{display:grid;grid-template-columns:320px 1fr;gap:15px;max-width:1300px;width:100%}
    .sidebar{display:flex;flex-direction:column;gap:10px;height:95vh}
    
    #auth-container { background: #1a1a1a; border: 1px solid #444; padding: 12px; }
    #user-info { display: none; margin-top: 10px; }
    #nick-input { background: #000; border: 1px solid #444; color: #6f6; width: 100%; padding: 5px; font-family: monospace; outline: none; }
    
    /* ФИКС ЧАТА: добавлена фиксированная высота и корректный flex */
    .chat-box { background: #000; border: 1px solid #333; display: flex; flex-direction: column; flex: 1; min-height: 400px; overflow: hidden; }
    #chat-messages { flex: 1; overflow-y: auto; font-size: 12px; padding: 10px; border-bottom: 1px solid #222; background: #050505;}
    
    .chat-msg { margin-bottom: 8px; border-bottom: 1px solid #111; padding: 6px; word-break: break-word; }
    .chat-msg-mention { background: #1a2a1a !important; border-left: 3px solid #6f6; } 
    
    .chat-name { color: #fd6; font-weight: bold; cursor: pointer; text-decoration: underline dotted; }
    .chat-name-self { color: #6f6 !important; font-weight: bold; cursor: pointer; }
    
    .chat-input-row { display: flex; background: #111; height: 40px; }
    #chat-input { background: #000; border: none; color: #6f6; flex: 1; padding: 0 10px; font-family: monospace; outline: none; }
    #chat-send { background: #222; border: none; color: #6f6; width: 50px; cursor: pointer; }

    .game-panel { background: #111; padding: 20px; border: 1px solid #444; overflow-y: auto; height: 95vh; box-sizing: border-box; }
    .loc-header { background: #222; padding: 15px; border: 1px solid #444; text-align: center; margin-bottom: 15px; border-left: 5px solid #f44; }
    .loc-name { font-size: 20px; color: #fff; font-weight: bold; text-transform: uppercase; }
    
    .stats-emoji { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 15px; }
    .s-item { background: #050505; border: 1px solid #333; padding: 8px 2px; text-align: center; border-radius: 4px; border-bottom: 2px solid #444; }
    .s-val { font-size: 11px; font-weight: bold; color: #fff; display: block;}
    
    .log-container { display: flex; gap: 10px; margin-bottom: 15px; align-items: stretch; }
    #log { flex-grow: 1; height: 160px; overflow-y: auto; background: #000; border: 1px solid #333; padding: 10px; font-size: 12px; color: #ccc; }
    
    .title { color: #555; border-bottom: 1px solid #333; margin: 25px 0 10px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .inv-inline { background: #0a0a0a; padding: 10px; border: 1px solid #222; font-size: 12px; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 12px; color: #6f6; min-height: 40px;}
    
    button { background: #1a1a1a; color: #d4c4a8; border: 1px solid #444; padding: 12px; cursor: pointer; font-family: monospace; text-align: left; }
    button:hover:not(:disabled) { background: #252525; border-color: #6f6; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    #archive-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; box-sizing: border-box; }
    .archive-content { max-width: 800px; margin: 0 auto; background: #111; border: 1px solid #444; height: 90vh; display: flex; flex-direction: column; }
    .archive-header { padding: 15px; background: #222; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; }
    #archive-list { flex-grow: 1; overflow-y: auto; padding: 20px; }
    .category-content { display: none; padding: 10px 0; grid-template-columns: 1fr 1fr; gap: 8px; }
    .category-content.active { display: grid; }
    .version-footer { text-align: center; color: #333; font-size: 10px; margin-top: 20px; padding: 10px; border-top: 1px solid #1a1a1a; text-transform: uppercase; }
  </style>
</head>
<body>

  <div class="container">
    <div class="sidebar">
      <div id="auth-container">
        <button id="login-btn" style="width:100%">🔑 ВХОД GOOGLE</button>
        <div id="user-info">
          <div style="font-size: 10px; color: #888;">ПОЗЫВНОЙ:</div>
          <input type="text" id="nick-input" maxlength="15" placeholder="Твой ник...">
        </div>
      </div>
      
      <div class="chat-box">
        <div id="chat-messages">Система связи загружается...</div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="Введите сообщение..." maxlength="100">
          <button id="chat-send">▶</button>
        </div>
      </div>
      
      <button onclick="openArchive()" style="width:100%; margin-top:5px; font-size:10px; text-align:center;">📜 ОТКРЫТЬ АРХИВ ЧАТА</button>
    </div>

    <div class="game-panel">
      <div class="loc-header"><span class="loc-name" id="cur-loc-name">ОЖИДАНИЕ...</span></div>
      <div class="stats-emoji" id="stats"></div>
      
      <div class="log-container">
        <div id="log"></div>
      </div>
      
      <div class="title">🎒 ИНВЕНТАРЬ</div>
      <div id="inventory" class="inv-inline"></div>
      
      <div class="title">📍 ДЕЙСТВИЯ</div>
      <div id="local-actions" class="grid-2"></div>

      <div class="title">🗺️ ПЕРЕМЕЩЕНИЕ</div>
      <div id="move-actions" class="grid-2"></div>
      
      <div class="title">🛠️ МАСТЕРСКАЯ</div>
      <div class="category-header" onclick="$('cat-craft').classList.toggle('active')"><span>КРАФТ</span></div>
      <div id="cat-craft" class="category-content active"></div>

      <button style="width:100%; margin-top:40px; background:#300; color:#f66; border:1px solid #600; text-align:center" onclick="resetGame()">[ ОБНУЛИТЬ ПРОГРЕСС ]</button>
      <div class="version-footer">ЗОНА 1988: Build v16.11 // SanderElr</div>
    </div>
  </div>

  <div id="archive-modal">
    <div class="archive-content">
      <div class="archive-header"><span style="color:#6f6;">АРХИВ ПЕРЕГОВОРОВ</span><button onclick="closeArchive()">[ X ]</button></div>
      <div id="archive-list"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = { apiKey: "AIzaSyBeCXQduKrz67Cs1SnqFFEktxAaaYNfFho", authDomain: "vptest1-6a89d.firebaseapp.com", projectId: "vptest1-6a89d", appId: "1:452937918921:web:739b70ad20075896a1e018" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();
    const $ = id => document.getElementById(id);
    let currentUser = null, over = false, S = null, chatUnsub = null;

    const WORLD = {
      home: { n:'🏠 Убежище', actions: ['rest', 'radio'] },
      city: { n:'🏙️ Город', actions: ['city_slums'] },
      forest: { n:'🌲 Лес', actions: ['get_wood_fast'] }
    };

    // ФУНКЦИЯ ЧАТА (ФИКС)
    function startChat() {
      if(chatUnsub) chatUnsub();
      console.log("Chat sync started...");
      
      chatUnsub = db.collection('messages').orderBy('createdAt', 'asc').limitToLast(30).onSnapshot(snap => {
        const myNick = $('nick-input').value.trim();
        const box = $('chat-messages');
        box.innerHTML = '';
        
        if(snap.empty) { box.innerHTML = '<div style="color:#444">Эфир пуст...</div>'; return; }

        snap.forEach(doc => {
          const m = doc.data();
          if(!m.name || !m.text) return;
          const isM = myNick && m.text.includes(`@${myNick}`);
          const isSelf = m.name === myNick;
          
          const div = document.createElement('div');
          div.className = `chat-msg ${isM ? 'chat-msg-mention' : ''}`;
          div.innerHTML = `<span class="${isSelf?'chat-name-self':'chat-name'}" onclick="mention('${m.name}')">${m.name}:</span> <span>${m.text}</span>`;
          box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
      }, err => {
        console.error("Chat Error:", err);
        $('chat-messages').innerHTML = '<div style="color:red">Ошибка связи с сервером.</div>';
      });
    }

    function mention(name) { const i = $('chat-input'); i.value = `@${name}, ${i.value}`; i.focus(); }

    async function sendMsg() {
      const t = $('chat-input').value.trim();
      const n = $('nick-input').value.trim() || currentUser.displayName.split(' ')[0];
      if(!t || !currentUser) return;
      try {
        await db.collection('messages').add({ name: n, text: t, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        $('chat-input').value = '';
      } catch(e) { console.error("Send Error:", e); }
    }

    // ИГРОВАЯ ЛОГИКА
    function ui() {
      if(!S) return;
      const loc = WORLD[S.loc] || WORLD.home;
      $('cur-loc-name').textContent = loc.n;
      $('stats').innerHTML = [['❤️', S.hp], ['🍞', S.food], ['💧', S.water], ['⚡', S.energy], ['☢️', S.rad], ['📅', S.day]].map(s=>`<div class="s-item"><span>${s[0]}</span><span class="s-val">${s[1]}</span></div>`).join('');
      
      const invItems = [['fish','🐟'],['wood','🪵'],['rags','🧵'],['water_res','💧'],['batteries','🔋']];
      $('inventory').innerHTML = invItems.map(i=>S[i[0]]>0?`<span>${i[1]} ${S[i[0]]}</span>`:'').join(' ');
      
      $('local-actions').innerHTML = loc.actions.map(a=>`<button onclick="doAction('${a}')">${a}</button>`).join('');
      $('move-actions').innerHTML = Object.keys(WORLD).map(id=>`<button ${id===S.loc?'disabled':''} onclick="moveTo('${id}')">${WORLD[id].n}</button>`).join('');
      
      $('cat-craft').innerHTML = `<button onclick="craft('fish')">Жарить рыбу (1🐟 1🪵)</button>`;
    }

    function doAction(a) {
      if(over) return;
      if(a==='rest') { S.day++; S.hp=Math.min(100, S.hp+20); S.energy=100; log("💤 Отдых"); }
      else if(a==='city_slums') { S.rags++; log("🧵 Нашел тряпки"); }
      else if(a==='get_wood_fast') { S.wood+=2; log("🪵 Собрал дров"); }
      S.food=Math.max(0, S.food-5); ui(); save();
    }

    function moveTo(id) { S.loc=id; S.energy=Math.max(0, S.energy-10); log(`➡️ Ушел в ${WORLD[id].n}`); ui(); save(); }
    function log(m) { $('log').insertAdjacentHTML('afterbegin', `<div>[День ${S.day}] ${m}</div>`); }
    function save() { if(currentUser && S) db.collection('survival_v12').doc(currentUser.uid).set({S, over}); }

    auth.onAuthStateChanged(user => {
      if(user) {
        currentUser = user; $('auth-container').style.display='block'; $('user-info').style.display='block'; $('login-btn').style.display='none';
        const n = localStorage.getItem('zone_nick'); if(n) $('nick-input').value = n;
        db.collection('survival_v12').doc(user.uid).get().then(d => {
          if(d.exists) { S=d.data().S; over=d.data().over; } else { init(); }
          ui(); startChat();
        });
      }
    });

    function init() { S={day:1,hp:100,food:80,water:80,energy:100,rad:0,psy:100,loc:'home',fish:0,wood:5,rags:2,water_res:1,batteries:1}; over=false; }
    function resetGame() { if(confirm("Сбросить?")) { init(); ui(); save(); } }

    $('login-btn').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    $('chat-send').onclick = sendMsg;
    $('chat-input').onkeypress = e => { if(e.key==='Enter') sendMsg(); };
    $('nick-input').onchange = e => { localStorage.setItem('zone_nick', e.target.value); startChat(); };
    function openArchive() { $('archive-modal').style.display='block'; }
    function closeArchive() { $('archive-modal').style.display='none'; }
  </script>
</body>
</html>
