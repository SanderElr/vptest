  <style>
    body{background:#0a0a0a;color:#d4c4a8;font-family:monospace;margin:0;padding:10px;display:flex;justify-content:center}
    .container{display:grid;grid-template-columns:320px 1fr;gap:15px;max-width:1300px;width:100%}

    #chat-messages { flex-grow: 1; overflow-y: auto; font-size: 12px; padding: 10px; border-bottom: 1px solid #222;}

    #chat-input { background: #000; border: none; color: #6f6; flex-grow: 1; padding: 12px; font-family: monospace; outline: none; }
    #chat-send { background: #222; border: none; color: #6f6; padding: 0 15px; cursor: pointer; }

    .game-panel { background: #111; padding: 20px; border: 1px solid #444; overflow-y: auto; height: 95vh; box-sizing: border-box; }
    .loc-header { background: #222; padding: 15px; border: 1px solid #444; text-align: center; margin-bottom: 15px; border-left: 5px solid #f44; }
    .loc-name { font-size: 20px; color: #fff; font-weight: bold; text-transform: uppercase; }
    
    .stats-emoji { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 15px; }
    .s-item { background: #050505; border: 1px solid #333; padding: 8px 2px; text-align: center; border-radius: 4px; border-bottom: 2px solid #444; }
    .s-val { font-size: 11px; font-weight: bold; color: #fff; display: block;}
    
    .log-container { display: flex; gap: 10px; margin-bottom: 15px; align-items: stretch; }
    #log { flex-grow: 1; height: 160px; overflow-y: auto; background: #000; border: 1px solid #333; padding: 10px; font-size: 12px; color: #ccc; }
    
    .radio-img-box { 
        width: 120px; 
        height: 182px; 
        background: #000; 
        border: 1px solid #333; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        overflow: hidden;
    }
    #radio-visual { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; transition: all 0.3s; filter: grayscale(1); }
    .active-radio { opacity: 1.0 !important; filter: grayscale(0) !important; border-color: #6f6 !important; box-shadow: 0 0 15px rgba(0,255,0,0.4); }

    .title { color: #555; border-bottom: 1px solid #333; margin: 25px 0 10px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .inv-inline { background: #0a0a0a; padding: 10px; border: 1px solid #222; font-size: 12px; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 12px; color: #6f6; }
    
    button { background: #1a1a1a; color: #d4c4a8; border: 1px solid #444; padding: 12px; cursor: pointer; font-family: monospace; text-align: left; }
    button:hover:not(:disabled) { background: #252525; border-color: #6f6; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    .category-header { background: #1a1a1a; border: 1px solid #333; color: #f90; padding: 12px; margin-top: 8px; cursor: pointer; display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; }
    .category-header:hover { background: #222; border-color: #f90; }
    .category-content { display: none; padding: 10px 0; grid-template-columns: 1fr 1fr; gap: 8px; }
    .category-content.active { display: grid; }
    
    .recipe-btn { border-color: #f90; color: #f90; font-size: 10px; line-height: 1.3; display: flex; flex-direction: column; }
    .r-price { color: #888; font-size: 9px; }
    .r-stats { color: #6f6; font-size: 9px; }

    .bad { color: #f66; font-weight: bold; } .good { color: #6f6; } .warn { color: #fd6; }
    .critical { border-color: #f44 !important; animation: blink 0.8s infinite; color: #f44 !important; }
    @keyframes blink { 50% { opacity: 0.3; } }
  </style>
</head>
<body>

  <div class="container">
    <div class="sidebar">
      <div id="auth-container">
        <button id="login-btn" style="width:100%">рЯФС –Т–•–Ю–Ф GOOGLE</button>
        <div id="user-info">

    <div class="game-panel">

      <div class="title">рЯУН –Ф–Х–Щ–°–Ґ–Т–Ш–ѓ</div>
      <div class="grid-2" id="local-actions"></div>

      <div class="title">рЯЧЇпЄП –Ъ–Р–†–Ґ–Р –Я–Х–†–Х–Ь–Х–©–Х–Э–Ш–Щ</div>
      <div class="grid-2" id="move-actions"></div>

      <div id="crafting-section">
        <div class="title">рЯЫ†пЄП –Ь–Р–°–Ґ–Х–†–°–Ъ–Р–ѓ –Ш –Ъ–£–•–Э–ѓ</div>
        
        <div class="category-header" onclick="toggleCategory('cat-cooking')">
          <span>рЯН≥ –У–Ю–Ґ–Ю–Т–Ъ–Р</span> <span id="arrow-cat-cooking">вЦЉ</span>
        </div>
        <div id="cat-cooking" class="category-content"></div>

        <div class="category-header" onclick="toggleCategory('cat-meds')">
          <span>рЯТК –Ь–Х–Ф–Ш–¶–Ш–Э–Р</span> <span id="arrow-cat-meds">вЦЉ</span>
        </div>
        <div id="cat-meds" class="category-content"></div>
      </div>
      
      <button style="width:100%; margin-top:40px; background:#300; color:#f66; border:1px solid #600; text-align:center" onclick="resetGame()">[ –Э–Р–І–Р–Ґ–ђ –Ч–Р–Э–Ю–Т–Ю ]</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script>
    // –°—Б—Л–ї–Ї–∞ –љ–∞ —В–≤–Њ–є —А–µ–њ–Њ–Ј–Є—В–Њ—А–Є–є
    const RADIO_IMG_URL = "https://raw.githubusercontent.com/SanderElr/vptest/main/radio.png";

    const RECIPES = [
      { id: 'fried_fish', cat: 'cooking', n: 'рЯН≥ –Ц–Р–†–Х–Э–Р–ѓ –†–Ђ–С–Р', p: '1рЯРЯ 1рЯ™µ', s: '+50рЯНЮ +10вЪ°', 
        check: (s) => s.fish >= 1 && s.wood >= 1,
        apply: (s) => { s.fish--; s.wood--; return { food: 50, energy: 10 }; } },
      { id: 'fried_fish_herbs', cat: 'cooking', n: 'рЯМњ –†–Ђ–С–Р –° –Ґ–†–Р–Т–Р–Ь–Ш', p: '1рЯРЯ 1рЯМњ 1рЯ™µ', s: '+55рЯНЮ +20вЪ° +15рЯІ†', 
        check: (s) => s.fish >= 1 && s.herbs >= 1 && s.wood >= 1,
        apply: (s) => { s.fish--; s.herbs--; s.wood--; return { food: 55, energy: 20, psy: 15 }; } },
      { id: 'rich_stew', cat: 'cooking', n: 'рЯ•Ш –†–Р–У–£ "–Ч–Ю–Э–Р"', p: '1рЯРЯ 1рЯМњ 2рЯНД 1рЯ™µ', s: '+85рЯНЮ +30вЭ§пЄП +20вЪ°', 
        check: (s) => s.fish >= 1 && s.herbs >= 1 && s.mushrooms >= 2 && s.wood >= 1,
        apply: (s) => { s.fish--; s.herbs--; s.mushrooms -= 2; s.wood--; return { food: 85, hp: 30, energy: 20 }; } },
      { id: 'mush_soup_herbs', cat: 'cooking', n: 'рЯ•£ –У–†–Ш–С–Э–Ю–Щ –°–£–Я –° –Ґ–†–Р–Т–Р–Ь–Ш', p: '2рЯНД 1рЯМњ 1рЯТІ 1рЯ™µ', s: '+60рЯНЮ +20вЭ§пЄП +10рЯІ†', 
        check: (s) => s.mushrooms >= 2 && s.herbs >= 1 && s.water_res >= 1 && s.wood >= 1,
        apply: (s) => { s.mushrooms -= 2; s.herbs--; s.water_res--; s.wood--; return { food: 60, hp: 20, psy: 10 }; } },
      { id: 'herb_berry_tea', cat: 'meds', n: 'рЯНµ –Ю–Ґ–Т–Р–† (–Ґ–†–Р–Т–Ђ + –ѓ–У–Ю–Ф–Ђ)', p: '2рЯМњ 2рЯНТ 1рЯТІ 1рЯ™µ', s: '-30вШҐпЄП +20рЯІ† +30рЯТІ', 
        check: (s) => s.herbs >= 2 && s.berries >= 2 && s.water_res >= 1 && s.wood >= 1,
        apply: (s) => { s.herbs -= 2; s.berries -= 2; s.water_res--; s.wood--; return { rad: -30, psy: 20, water: 30 }; } },
      { id: 'clean_bandages', cat: 'meds', n: 'вЬ® –І–Ш–°–Ґ–Ђ–Х –С–Ш–Э–Ґ–Ђ', p: '2рЯІµ 1рЯТІ 1рЯ™µ', s: '+40вЭ§пЄП', 
        check: (s) => s.rags >= 2 && s.water_res >= 1 && s.wood >= 1,
        apply: (s) => { s.rags -= 2; s.water_res--; s.wood--; return { hp: 40 }; } },
      { id: 'herb_bandage', cat: 'meds', n: 'рЯ©є –Я–Ю–Т–ѓ–Ч–Ъ–Р –° –Ґ–†–Р–Т–Р–Ь–Ш', p: '1рЯІµ 2рЯМњ', s: '+25вЭ§пЄП +5рЯІ†', 
        check: (s) => s.rags >= 1 && s.herbs >= 2,
        apply: (s) => { s.rags--; s.herbs -= 2; return { hp: 25, psy: 5 }; } }
    ];

    const firebaseConfig = {
      apiKey: "AIzaSyBeCXQduKrz67Cs1SnqFFEktxAaaYNfFho",
      authDomain: "vptest1-6a89d.firebaseapp.com",
      projectId: "vptest1-6a89d",
      appId: "1:452937918921:web:739b70ad20075896a1e018",
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentUser = null, over = false, S = {}, chatUnsub = null;
    const $ = id => document.getElementById(id);

    // –°–±–∞–ї–∞–љ—Б–Є—А–Њ–≤–∞–љ–љ—Л–є —А–∞—Б—Е–Њ–і –њ—Б–Є—Е–Є–Ї–Є
    const WORLD = {
      home: { n:'рЯП† –£–±–µ–ґ–Є—Й–µ', rad:0, energy: 0, psy: 0, actions: ['rest', 'radio'] },
      city: { n:'рЯПЩпЄП –У–Њ—А–Њ–і', rad:8, energy: 12, psy: 6, actions: ['city_slums', 'city_factory', 'city_hospital', 'city_shop'] },
      forest: { n:'рЯМ≤ –Ы–µ—Б', rad:5, energy: 10, psy: 5, actions: ['get_wood_fast', 'forest_search'] },
      river: { n:'рЯМК –С–µ—А–µ–≥', rad:2, energy: 8, psy: 3, actions: ['get_water', 'fishing'] },
      swamp: { n:'рЯНД –С–Њ–ї–Њ—В–Њ', rad:15, energy: 15, psy: 9, actions: ['get_herbs', 'get_berries'] }
    };

    function updateS(attr, delta) {
      if (over && attr !== 'hp') return; 
      S[attr] = Math.max(0, Math.min(100, (S[attr] || 0) + delta));
      if (S.hp <= 0) { S.hp = 0; over = true; log("рЯТА –°–Њ–Ј–љ–∞–љ–Є–µ –њ–Њ–≥–∞—Б–ї–Њ...", "bad"); }
    }

    function processSurvival(eCost = 0, pCost = 0) {
      if (over) return;
      if (S.energy < eCost) { updateS('hp', -10); log("вЪ† –Ш–Ј–љ–µ–Љ–Њ–ґ–µ–љ–Є–µ (-10 HP)", "bad"); }
      updateS('energy', -eCost);
      if (S.psy < pCost) { updateS('hp', -12); log("вЪ† –Ґ—П–ґ–µ–ї—Л–µ –Љ—Л—Б–ї–Є –і–∞–≤—П—В (-12 HP)", "bad"); }
      updateS('psy', -pCost);

      let dmg = 0;
      if (S.food <= 0) dmg += 5;
      if (S.water <= 0) dmg += 8;
      if (S.rad >= 85) dmg += 15;
      if (S.psy <= 10) dmg += 5;
      if (dmg > 0) { updateS('hp', -dmg); log(`вЪ† –°–Њ—Б—В–Њ—П–љ–Є–µ –Ї—А–Є—В–Є—З–µ—Б–Ї–Њ–µ: -${dmg} HP`, "bad"); }
    }

    function toggleCategory(id) {
        $(id).classList.toggle('active');
        $('arrow-' + id).textContent = $(id).classList.contains('active') ? 'вЦ≤' : 'вЦЉ';
    }

    function moveTo(locId) {
      if(over) return;
      log(`вЮ°пЄП –Я—Г—В—М –≤ ${WORLD[locId].n}...`, "warn");
      updateS('food', -5); updateS('water', -5);
      S.loc = locId;
      updateS('rad', WORLD[locId].rad);
      processSurvival(15, 6);
      ui(); saveProgress();
    }

    function doAction(act) {
      if(over) return;
      
      if(act === 'radio') {
          if(S.batteries > 0) {
              S.batteries--;
              updateS('psy', 40);
              log("рЯУї –°–≤—П–Ј—М —Г—Б—В–∞–љ–Њ–≤–ї–µ–љ–∞. –У–Њ–ї–Њ—Б–∞ –≤ —Н—Д–Є—А–µ –і–∞—А—П—В —Б–њ–Њ–Ї–Њ–є—Б—В–≤–Є–µ... (+40 рЯІ†)", "good");
              $('radio-visual').classList.add('active-radio');
              setTimeout(() => $('radio-visual').classList.remove('active-radio'), 3000);
          } else {
              log("рЯЪЂ –†–∞—Ж–Є—П –Љ–µ—А—В–≤–∞. –Э—Г–ґ–љ–∞ –±–∞—В–∞—А–µ–є–Ї–∞ рЯФЛ", "bad");
          }
          ui(); saveProgress(); return;
      }

      let eCost = WORLD[S.loc].energy || 10;
      let pCost = WORLD[S.loc].psy || 8;
      updateS('food', -3); updateS('water', -4);
      
      let m = ""; let r = Math.random();
      if(act === 'city_slums') { 
          if(r<0.4) {S.rags+=2; m="–Э–∞—И–µ–ї –Ґ—А—П–њ—М–µ (+2рЯІµ)";} 
          else if(r<0.6){S.batteries+=1; m="–Э–∞—И–µ–ї –С–∞—В–∞—А–µ–є–Ї—Г (+1рЯФЛ)";}
          else if(r<0.8){S.canned+=1; m="–Э–∞—И–µ–ї –Ґ—Г—И–µ–љ–Ї—Г (+1рЯ•Ђ)";} 
      }
      else if(act === 'city_factory') { 
          if(r<0.5){S.scrap+=2; m="–Э–∞—И–µ–ї –•–ї–∞–Љ (+2вЪЩ)";} 
          else if(r<0.7){S.batteries+=1; m="–Э–∞—И–µ–ї –С–∞—В–∞—А–µ–є–Ї—Г (+1рЯФЛ)";}
          else if(r<0.9){S.wood+=2; m="–Э–∞—И–µ–ї –Ф—А–Њ–≤–∞ (+2рЯ™µ)";} 
      }
      else if(act === 'city_hospital') { updateS('rad', 8); if(r<0.5){S.meds+=1; m="–Э–∞—И–µ–ї –Р–њ—В–µ—З–Ї—Г (+1рЯТК)";} }
      else if(act === 'city_shop') { if(r<0.4){S.canned+=2; m="–Э–∞—И–µ–ї –Х–і—Г (+2рЯ•Ђ)";} }
      else if(act === 'get_wood_fast') { S.wood += 3; m = "–Э–∞—А—Г–±–Є–ї –і—А–Њ–≤ (+3рЯ™µ)"; }
      else if(act === 'forest_search') { if(r<0.4){S.berries+=3; m="–Э–∞—И–µ–ї –ѓ–≥–Њ–і—Л (+3рЯНТ)";} else if(r<0.7){S.mushrooms+=2; m="–Э–∞—И–µ–ї –У—А–Є–±—Л (+2рЯНД)";} }
      else if(act === 'get_water') { S.water_res += 3; m="–Э–∞–±—А–∞–ї –≤–Њ–і—Л (+3рЯТІ)"; }
      else if(act === 'fishing') { if(r<0.6){S.fish += 1; m="–£–ї–Њ–≤: –†—Л–±–∞ (+1рЯРЯ)";} }
      else if(act === 'get_herbs') { S.herbs += 3; m="–°–Њ–±—А–∞–ї –Ґ—А–∞–≤—Л (+3рЯМњ)"; }
      else if(act === 'get_berries') { S.berries += 3; m="–Э–∞—И–µ–ї –ѓ–≥–Њ–і—Л (+3рЯНТ)"; }
      
      if(act === 'rest') { 
          S.day++; updateS('energy', 100); updateS('psy', 40); updateS('hp', 25);
          log("рЯТ§ –Э–Њ–≤—Л–є –і–µ–љ—М. –°–Њ–љ –њ–Њ—И–µ–ї –љ–∞ –њ–Њ–ї—М–Ј—Г.", "good");
          processSurvival(0, 0); ui(); saveProgress(); return; 
      }

      if(!m) m = "–Э–Є—З–µ–≥–Њ –Є–љ—В–µ—А–µ—Б–љ–Њ–≥–Њ.";
      log(m + ` [вЪ°-${eCost} рЯІ†-${pCost}]`);
      processSurvival(eCost, pCost); ui(); saveProgress();
    }

    function useItem(id) {
      if(over || S[id] <= 0) return;
      if(['wood', 'scrap', 'rags', 'batteries'].includes(id)) return;
      S[id]--;
      if(id === 'meds') { updateS('hp', 30); updateS('psy', 25); updateS('rad', -15); log("рЯТК –Я—А–Є–љ—П–ї —В–∞–±–ї–µ—В–Ї–Є"); }
      if(id === 'fish') { updateS('food', 20); updateS('rad', 15); updateS('hp', -10); log("рЯ§Ґ –°—К–µ–ї —Б—Л—А—Г—О —А—Л–±—Г"); }
      if(id === 'mushrooms') { updateS('food', 12); updateS('rad', 10); log("рЯНД –°—К–µ–ї –≥—А–Є–±"); }
      if(id === 'berries') { updateS('food', 5); updateS('water', 5); updateS('energy', 3); log("рЯНТ –У–Њ—А—Б—В—М —П–≥–Њ–і"); }
      if(id === 'canned') { updateS('food', 100); updateS('psy', 10); log("рЯ•Ђ –Т–Ї—Г—Б–љ–∞—П —В—Г—И–µ–љ–Ї–∞"); }
      if(id === 'water_res') { updateS('water', 100); log("рЯТІ –І–Є—Б—В–∞—П –≤–Њ–і–∞"); }
      ui(); saveProgress();
    }

    function craft(recipeId) {
        if(over) return;
        const recipe = RECIPES.find(r => r.id === recipeId);
        if (recipe && recipe.check(S)) {
            const effects = recipe.apply(S);
            for (let stat in effects) { updateS(stat, effects[stat]); }
            log(`рЯЫ†пЄП –°–Ї—А–∞—Д—З–µ–љ–Њ: ${recipe.n}`, "good");
            ui(); saveProgress();
        } else { log("рЯЪЂ –Э–µ–і–Њ—Б—В–∞—В–Њ—З–љ–Њ –Љ–∞—В–µ—А–Є–∞–ї–Њ–≤", "bad"); }
    }

    function startChat() {
      if(chatUnsub) chatUnsub();
      chatUnsub = db.collection('messages').orderBy('createdAt', 'asc').limitToLast(30).onSnapshot(snap => {
        $('chat-messages').innerHTML = '';
        snap.forEach(doc => {
          const m = doc.data();
          $('chat-messages').innerHTML += `<div class="chat-msg"><span class="chat-name">${m.name || "–Р–љ–Њ–љ–Є–Љ"}:</span> <span>${m.text}</span></div>`;
        });
        $('chat-messages').scrollTop = $('chat-messages').scrollHeight;
      });
    }

    async function sendMsg() {
      const txt = $('chat-input').value.trim();
      const nick = $('nick-input').value.trim() || currentUser.displayName.split(' ')[0];
      if(!txt || !currentUser) return;
      await db.collection('messages').add({ name: nick, text: txt, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      $('chat-input').value = '';
    }

    auth.onAuthStateChanged(user => { 
      if (user) { 
        currentUser = user; 
        $('login-btn').style.display = 'none'; 
        $('user-info').style.display = 'block'; 
        $('nick-input').value = localStorage.getItem('zone_nick') || user.displayName.split(' ')[0];
        loadProgress(); startChat(); 
      } 
    });

    $('nick-input').onchange = (e) => localStorage.setItem('zone_nick', e.target.value);
    $('login-btn').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    $('chat-send').onclick = sendMsg;
    $('chat-input').onkeypress = (e) => { if(e.key==='Enter') sendMsg(); };

    async function saveProgress() { if(!currentUser) return; await db.collection('survival_v12').doc(currentUser.uid).set({S, over}); }
    async function loadProgress() {
      const doc = await db.collection('survival_v12').doc(currentUser.uid).get();
      if(doc.exists) { S = doc.data().S; over = doc.data().over || false; ui(); } else { initGame(); }
    }

    async function initGame() {
      S = { day:1, hp:100, food:80, water:80, energy:100, rad:0, psy:100, loc:'home', fish:0, mushrooms:0, berries:0, wood:5, water_res:2, herbs:0, scrap:0, rags:0, canned:1, meds:0, batteries:1 };
      over = false; ui(); await saveProgress();
    }

    function resetGame() { if(confirm("–°–±—А–Њ—Б–Є—В—М –≤–µ—Б—М –њ—А–Њ–≥—А–µ—Б—Б?")) initGame(); }
    function log(m, t='info') { $('log').insertAdjacentHTML('afterbegin', `<div class="${t}">[–Ф–µ–љ—М ${S.day}] ${m}</div>`); }

    function ui() {
      const loc = WORLD[S.loc];
      $('cur-loc-name').textContent = loc.n;

      const st = [['вЭ§пЄП', S.hp], ['рЯНЮ', S.food], ['рЯТІ', S.water], ['вЪ°', S.energy], ['вШҐпЄП', S.rad], ['рЯІ†', S.psy], ['рЯУЕ', S.day]];
      $('stats').innerHTML = st.map(s => {
        let isCrit = (s[0]==='вШҐпЄП') ? s[1] >= 85 : (s[1] <= 15 && s[0] !== 'рЯУЕ');
        return `<div class="s-item ${isCrit ? 'critical' : ''}"><span>${s[0]}</span><span class="s-val">${s[1]}${s[0]==='рЯУЕ'?'':'%'}</span></div>`;
      }).join('');

      const invItems = [['canned','рЯ•Ђ'], ['water_res','рЯТІ'], ['berries','рЯНТ'], ['fish','рЯРЯ'], ['mushrooms','рЯНД'], ['wood','рЯ™µ'], ['herbs','рЯМњ'], ['scrap','вЪЩпЄП'], ['rags','рЯІµ'], ['meds','рЯТК'], ['batteries','рЯФЛ']];
      $('inventory').innerHTML = invItems.map(i => {
          if(S[i[0]] <= 0) return '';
          let canUse = !['wood', 'scrap', 'rags', 'batteries'].includes(i[0]);
          return `<span style="${canUse?'cursor:pointer;text-decoration:underline':''}" onclick="${canUse?`useItem('${i[0]}')`:'' }">${i[1]} ${S[i[0]]}</span>`;
      }).join(' ');

      const renderCat = (cat) => RECIPES.filter(r => r.cat === cat).map(r => `
        <button class="recipe-btn" ${!r.check(S) || over ? 'disabled' : ''} onclick="craft('${r.id}')">
          <span>${r.n}</span>
          <span class="r-price">–¶–µ–љ–∞: ${r.p}</span>
          <span class="r-stats">–≠—Д—Д–µ–Ї—В: ${r.s}</span>
        </button>
      `).join('');

      $('cat-cooking').innerHTML = renderCat('cooking');
      $('cat-meds').innerHTML = renderCat('meds');

      $('local-actions').innerHTML = loc.actions.map(a => `<button ${over?'disabled':''} onclick="doAction('${a}')">${{rest:'рЯТ§ –°–Њ–љ', radio:'рЯУї –†–∞–і–Є–Њ—Б–≤—П–Ј—М (рЯФЛ1)', city_slums:'рЯПЩпЄП –Ґ—А—Г—Й–Њ–±—Л', city_factory:'рЯП≠ –Ч–∞–≤–Њ–і', city_hospital:'рЯП• –С–Њ–ї—М–љ–Є—Ж–∞', city_shop:'рЯП™ –Ь–∞–≥–∞–Ј–Є–љ', get_wood_fast:'рЯ™У –Ф—А–Њ–≤–∞', forest_search:'рЯМ≤ –Я–Њ–Є—Б–Ї', get_water:'рЯПЇ –Т–Њ–і–∞', fishing:'рЯО£ –†—Л–±–∞–ї–Ї–∞', get_herbs:'рЯМњ –Ґ—А–∞–≤—Л', get_berries:'рЯНТ –ѓ–≥–Њ–і—Л'}[a]}</button>`).join('');
      $('move-actions').innerHTML = Object.entries(WORLD).map(([id, data]) => `<button class="move-btn" ${id===S.loc||over?'disabled':''} onclick="moveTo('${id}')">вЮ°пЄП ${data.n}</button>`).join('');
      
      if(over) $('local-actions').innerHTML = '<b class="bad" style="grid-column: 1/3; text-align: center; padding: 10px; border: 1px solid red;">–Я–Ю–Ґ–†–Р–І–Х–Э–Ю.</b>';
    }
  </script>
</body>
</html>
