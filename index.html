<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ЗОНА 1988: Hardcore Survival</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/SanderElr/vptest/main/favicon.png">
  <style>
    body{background:#0a0a0a;color:#d4c4a8;font-family:monospace;margin:0;padding:10px;display:flex;justify-content:center}
    .container{display:grid;grid-template-columns:320px 1fr;gap:15px;max-width:1300px;width:100%}
    .sidebar{display:flex;flex-direction:column;gap:10px;height:95vh}
    
    /* ЧАТ И ИНТЕРФЕЙС */
    #auth-container { background: #1a1a1a; border: 1px solid #444; padding: 12px; }
    #user-info { display: none; margin-top: 10px; }
    #nick-input { background: #000; border: 1px solid #444; color: #6f6; width: 100%; padding: 5px; font-family: monospace; outline: none; }
    .chat-box { background: #000; border: 1px solid #333; display: flex; flex-direction: column; flex: 1; min-height: 400px; overflow: hidden; }
    #chat-messages { flex: 1; overflow-y: auto; font-size: 12px; padding: 10px; border-bottom: 1px solid #222; background: #050505; }
    .chat-msg { margin-bottom: 8px; border-bottom: 1px solid #111; padding: 6px; word-break: break-word; border-left: 3px solid transparent; }
    .chat-name { color: #fd6; font-weight: bold; cursor: pointer; text-decoration: underline dotted; }
    .chat-name-self { color: #00ff00 !important; font-weight: bold; cursor: pointer; }
    .chat-msg-highlight { background: #1a1a1a !important; border-left-color: #00ff00; }
    .chat-msg-mention-alt { border-left-color: #fd6 !important; }
    .chat-input-row { display: flex; background: #111; height: 40px; }
    #chat-input { background: #000; border: none; color: #6f6; flex: 1; padding: 0 10px; font-family: monospace; outline: none; }
    #chat-send { background: #222; border: none; color: #6f6; width: 50px; cursor: pointer; }

    /* ГЕЙМПЛЕЙ */
    .game-panel { background: #111; padding: 20px; border: 1px solid #444; overflow-y: auto; height: 95vh; box-sizing: border-box; }
    .time-weather-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; font-size: 11px; background: #1a1a1a; padding: 10px; border: 1px solid #333; }
    .tw-item { color: #888; }
    .tw-val { color: #fff; font-weight: bold; float: right; }

    .top-panel { display: flex; gap: 10px; margin-bottom: 15px; align-items: stretch; }
    .loc-header { background: #222; padding: 10px 15px; border: 1px solid #444; border-left: 5px solid #f44; display: flex; align-items: center; justify-content: center; min-width: 140px; }
    .loc-name { font-size: 14px; color: #fff; font-weight: bold; text-transform: uppercase; }
    .radio-text { flex: 1; background: #050505; border: 1px solid #333; color: #6a9c6a; font-size: 11px; padding: 10px; font-style: italic; display: flex; align-items: center; }

    .log-row { display: flex; gap: 10px; height: 200px; margin-bottom: 15px; }
    #log { flex: 1; overflow-y: auto; background: #000; border: 1px solid #333; padding: 10px; font-size: 12px; color: #ccc; }
    #loc-img { width: 200px; height: 200px; background: #050505; border: 1px solid #444; background-size: cover; background-position: center; image-rendering: pixelated; }

    /* ПАНЕЛЬ СТАТИСТИКИ (В ОДНУ СТРОКУ) */
    .stats-grid { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 15px; }
    .s-item { flex: 1; background: #050505; border: 1px solid #333; padding: 8px 2px; text-align: center; }
    .s-val { font-size: 12px; font-weight: bold; color: #fff; display: block; margin-top: 4px; }
    
    .title { color: #555; border-bottom: 1px solid #333; margin: 20px 0 10px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    
    .inv-inline { background: #0a0a0a; padding: 10px; border: 1px solid #222; font-size: 12px; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 12px; color: #6f6; cursor: default; }
    .inv-item { position: relative; display: inline-block; }
    .inv-clickable { cursor: pointer; border-bottom: 1px dotted #6f6; transition: 0.2s; }
    .inv-clickable:hover { background: #1a3a1a; color: #fff; }
    
    button { background: #1a1a1a; color: #d4c4a8; border: 1px solid #444; padding: 10px; cursor: pointer; font-family: monospace; text-align: left; }
    button:hover:not(:disabled) { background: #252525; border-color: #6f6; }
    button:disabled { opacity: 0.3; cursor: not-allowed; color: #555; }
    .craft-cost { font-size: 10px; color: #888; margin-top: 4px; display: block; }

    #archive-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; box-sizing: border-box; }
    .archive-content { max-width: 800px; margin: 0 auto; background: #111; border: 1px solid #444; height: 90vh; display: flex; flex-direction: column; }
    .archive-header { padding: 15px; background: #222; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; }
    #archive-list { flex-grow: 1; overflow-y: auto; padding: 20px; font-size: 13px; }
    .bad { color: #f44; }
  </style>
</head>
<body>

  <div class="container">
    <div class="sidebar">
      <div style="background: #1a1a1a; border: 1px solid #444; padding: 10px; display: flex; align-items: center; justify-content: space-between;">
        <span style="font-size: 10px; color: #888;">СИГНАЛ ФОНА:</span>
        <button id="music-toggle" style="padding: 5px 10px; font-size: 10px; background: #222; color: #f66; border: 1px solid #444; cursor: pointer;">[ ВЫКЛ ]</button>
      </div>
      <audio id="bg-music" loop><source src="https://raw.githubusercontent.com/SanderElr/vptest/main/mus.mp3" type="audio/mpeg"></audio>

      <div id="auth-container">
        <button id="login-btn" style="width:100%; text-align:center;">🔑 ВХОД В СИСТЕМУ</button>
        <div id="user-info">
          <div style="font-size: 10px; color: #888; margin-bottom:4px;">ПОЗЫВНОЙ:</div>
          <input type="text" id="nick-input" maxlength="15" placeholder="Ваш ник...">
        </div>
      </div>
      
      <div class="chat-box">
        <div id="chat-messages"></div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="Передача..." maxlength="100">
          <button id="chat-send">▶</button>
        </div>
      </div>
      <button onclick="window.openArchive()" style="width:100%; font-size:10px; text-align:center; background:#111;">📜 АРХИВ ПЕРЕГОВОРОВ</button>
    </div>

    <div class="game-panel">
      <div class="time-weather-panel">
        <div class="tw-item">📅 Дата: <span class="tw-val" id="display-date">...</span></div>
        <div class="tw-item">☁️ Погода: <span class="tw-val" id="display-weather">...</span></div>
        <div class="tw-item">🕒 Время: <span class="tw-val" id="display-time">...</span></div>
        <div class="tw-item">🌓 Фаза: <span class="tw-val" id="display-phase">...</span></div>
      </div>

      <div class="top-panel">
        <div class="loc-header"><span class="loc-name" id="cur-loc-name">...</span></div>
        <div id="radio-display" class="radio-text">ПОИСК СИГНАЛА...</div>
      </div>
      
      <div class="stats-grid" id="stats"></div>
      
      <div class="log-row">
        <div id="log"></div>
        <div id="loc-img"></div>
      </div>
      
      <div class="title">🎒 ВЕЩИ И ПРЕДМЕТЫ</div>
      <div id="inventory" class="inv-inline"></div>
      
      <div class="title">🛠️ КРАФТ И ПРИГОТОВЛЕНИЕ</div>
      <div id="cook-actions" class="grid-2"></div>
      
      <div class="title">📍 ДЕЙСТВИЯ (1 ЧАС)</div>
      <div id="local-actions" class="grid-2"></div>
      
      <div class="title">🗺️ ПЕРЕХОД (3 ЧАСА)</div>
      <div id="move-actions" class="grid-2"></div>
      
      <button style="width:100%; margin-top:40px; background:#300; color:#f66; border:1px solid #600; text-align:center" onclick="resetGame()">[ СБРОС ИГРЫ (СМЕРТЬ) ]</button>
    </div>
  </div>

  <div id="archive-modal">
    <div class="archive-content">
      <div class="archive-header"><span style="color:#6f6;">АРХИВ</span><button onclick="window.closeArchive()" style="background:#400; color:#fff; border:none; padding:5px 15px; cursor:pointer;">[ X ]</button></div>
      <div id="archive-list"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script>
    // ==========================================
    // БАЗА ДАННЫХ ИГРЫ И СОБЫТИЙ
    // ==========================================
    
    // БАЗА РАДИО СООБЩЕНИЙ
    window.RADIO_MESSAGES = [
        "Шшш... Внимание всем сталкерам... Выброс ожидается через... шшш...",
        "Шшш... Кто-нибудь слышит? Мы застряли на заводе Юпитер... нужны медикаменты... шшш...",
        "Шшш... Куплю артефакты. Дорого. Спросить Сидоровича... шшш...",
        "Шшш... [звуки выстрелов и рычание] ...они лезут изо всех щелей! Отступаем! ...шшш...",
        "Шшш... [сквозь помехи играет старая советская песня] ...шшш...",
        "Шшш... Наблюдаю активность монолитовцев в секторе 4. Будьте осторожны... шшш...",
        "Шшш... Свобода рулит! Всем свободовцам сбор на базе... шшш...",
        "Шшш... Говорит Долг. Территория завода Росток находится под нашей защитой... шшш...",
        "Шшш... [жуткий шепот на грани слышимости] ...иди ко мне... шшш..."
    ];

    window.getRandomRadioMessage = function() {
        return window.RADIO_MESSAGES[Math.floor(Math.random() * window.RADIO_MESSAGES.length)];
    };

    window.GAME_EVENTS = {
        weather: [
            { n: "Ясно", mults: { scavenge: 1.2, cost: 1.0, rad: 0, psy: +1 } },
            { n: "Свинцовые тучи", mults: { scavenge: 1.0, cost: 1.0, rad: 0, psy: -1 } },
            { n: "Радиоактивный снег", mults: { scavenge: 0.8, cost: 1.2, rad: +2, psy: -2 } },
            { n: "Черный буран", mults: { scavenge: 0.4, cost: 2.0, rad: +1, psy: -5 } },
            { n: "Мертвый штиль", mults: { scavenge: 1.0, cost: 1.0, rad: 0, psy: -3 } },
            { n: "Кислотный иней", mults: { scavenge: 0.7, cost: 1.5, rad: +2, psy: -2 } }
        ],
        dayPhases: {
            night: { n: "Ночь", mults: { scavenge: 0.5, psy: -3 } },
            morning: { n: "Утро", mults: { scavenge: 1.0, psy: 0 } },
            day: { n: "День", mults: { scavenge: 1.1, psy: +1 } },
            evening: { n: "Вечер", mults: { scavenge: 0.9, psy: -1 } }
        }
    };

    window.WORLD = {
      home: { n: '🏠 Убежище', img: 'https://raw.githubusercontent.com/SanderElr/vptest/main/loc_home.png', acts: { 'rest': '💤 Спать (Восст. Сил и Психики)', 'radio': '📻 Радиоэфир (+Психика)' } },
      city: { n: '🏙️ Город', img: 'https://raw.githubusercontent.com/SanderElr/vptest/main/loc_city.png', acts: { 'scavenge_scrap': '⚙️ Искать лом', 'scavenge_rags': '🧵 Искать ветошь', 'search_ruins': '🏢 Рискованный поиск' } },
      forest: { n: '🌲 Лес', img: 'https://raw.githubusercontent.com/SanderElr/vptest/main/loc_forest.png', acts: { 'get_wood': '🪵 Рубить дрова', 'forage_herbs': '🌿 Травы и ягоды', 'burn_coal': '🔥 Жечь уголь (2 дров)' } },
      wasteland: { n: '☢️ Пустошь', img: 'https://raw.githubusercontent.com/SanderElr/vptest/main/loc_wasteland.png', acts: { 'scavenge_scrap': '⚙️ Собирать лом', 'stalking': '💀 Опасная вылазка' } },
      river: { n: '🌊 Река', img: 'https://raw.githubusercontent.com/SanderElr/vptest/main/loc_river.png', acts: { 'fish': '🐟 Рыбачить', 'get_water': '🪣 Набрать грязной воды' } },
      swamp: { n: '🍄 Болото', img: 'https://raw.githubusercontent.com/SanderElr/vptest/main/loc_swamp.png', acts: { 'forage_mushrooms': '🍄 Собирать грибы', 'get_water': '🪣 Набрать болотной воды' } }
    };

    window.RECIPES = {
        simple: {
            cook_fish: { n: "🔥 Пожарить рыбу", res: { raw_fish: 1, wood: 1 }, gain: { food: 35, psy: 5 }, log: "Рыба зажарена на костре." },
            make_bandage: { n: "🩹 Грязный бинт", res: { rags: 2 }, gain: { hp: 15 }, log: "Перевязал раны." }
        },
        advanced: {
            craft_filter: { n: "🛢️ Угольный фильтр", res: { coal: 1, rags: 1, scrap: 1 }, items: { filter: 1 }, log: "Собран фильтр для воды." },
            purify_water: { n: "💧 Очистить воду (Заполнить флягу)", res: { dirty_water: 1, filter: 1 }, custom: (s) => { s.flask = 3; }, log: "Фляга полна (3 глотка)." },
            brew_tea: { n: "🍵 Лечебный отвар", res: { dirty_water: 1, herbs: 1, berries: 1, wood: 1 }, gain: { hp: 15, psy: 20, rad: -10 }, log: "Отвар вывел радиацию." },
            cook_stew: { n: "🍲 Сталкерская похлебка", res: { raw_fish: 1, mushrooms: 1, dirty_water: 1, wood: 2 }, gain: { food: 60, hp: 10, psy: 15, rad: 5 }, log: "Наваристо, но фон повышен." }
        }
    };

    const ICONS = { raw_fish: '🐟', dirty_water: '🪣', wood: '🪵', rags: '🧵', scrap: '⚙️', coal: '⬛', herbs: '🌿', berries: '🫐', mushrooms: '🍄', filter: '🛢️' };

    window.canCraft = function(id, cat) {
        const r = window.RECIPES[cat][id];
        if (!r) return false;
        return Object.entries(r.res).every(([k, v]) => window.S[k] >= v);
    };

    window.getRecipeCostHTML = function(res) {
        return Object.entries(res).map(([k, v]) => `${ICONS[k]||k}${v}`).join(' ');
    };

    // ==========================================
    // ИНИЦИАЛИЗАЦИЯ И СИСТЕМНЫЕ НАСТРОЙКИ
    // ==========================================
    const firebaseConfig = { apiKey: "AIzaSyBeCXQduKrz67Cs1SnqFFEktxAaaYNfFho", authDomain: "vptest1-6a89d.firebaseapp.com", projectId: "vptest1-6a89d", appId: "1:452937918921:web:739b70ad20075896a1e018" };
    firebase.initializeApp(firebaseConfig);
    window.auth = firebase.auth();
    window.db = firebase.firestore();
    window.$ = id => document.getElementById(id);
    window.currentUser = null;
    window.S = null;

    // --- БЕЗОПАСНАЯ ЛОГИКА МУЗЫКИ ---
    const bgMusic = $('bg-music');
    const musicBtn = $('music-toggle');
    bgMusic.volume = 0.4;

    window.playMusic = function() {
        const playPromise = bgMusic.play();
        if (playPromise !== undefined) {
            playPromise.then(() => {
                musicBtn.textContent = "[ ВКЛ ]";
                musicBtn.style.color = "#6f6";
                localStorage.setItem('z_mus', '1');
            }).catch(e => {
                console.error("Audio block/error:", e);
                musicBtn.textContent = "[ ОШИБКА ЗВУКА ]";
                musicBtn.style.color = "#f44";
            });
        }
    };

    window.pauseMusic = function() {
        bgMusic.pause();
        musicBtn.textContent = "[ ВЫКЛ ]";
        musicBtn.style.color = "#f66";
        localStorage.setItem('z_mus', '0');
    };

    musicBtn.onclick = () => {
        if (bgMusic.paused) window.playMusic();
        else window.pauseMusic();
    };

    // Глобальный перехватчик первого клика (для обхода автоплея браузера)
    document.body.addEventListener('click', function initAudio() {
        if (localStorage.getItem('z_mus') === '1' && bgMusic.paused) {
            window.playMusic();
        }
        document.body.removeEventListener('click', initAudio);
    });

    // --- ЧАТ ---
    let chatUnsub = null;
    window.startChat = function() {
      if (chatUnsub) chatUnsub();
      chatUnsub = db.collection('messages').orderBy('createdAt', 'asc').limitToLast(25).onSnapshot(snap => {
        const myNick = $('nick-input').value.trim();
        const chatContainer = $('chat-messages');
        chatContainer.innerHTML = '';
        snap.forEach(doc => {
          const m = doc.data(); if (!m.name) return;
          const isMe = (myNick && m.name === myNick);
          const hasMention = (myNick && m.text.includes(`@${myNick}`));
          let cls = "chat-msg";
          if (isMe || hasMention) cls += " chat-msg-highlight";
          if (hasMention && !isMe) cls += " chat-msg-mention-alt";
          chatContainer.innerHTML += `<div class="${cls}"><span class="${isMe?'chat-name-self':'chat-name'}" onclick="window.mention('${m.name}')">${m.name}:</span> <span>${m.text}</span></div>`;
        });
        chatContainer.scrollTop = chatContainer.scrollHeight;
      });
    };
    window.sendChatMsg = () => {
      const i = $('chat-input'); const t = i.value.trim();
      const n = $('nick-input').value.trim() || currentUser.displayName.split(' ')[0];
      if (t && currentUser) { db.collection('messages').add({ name: n, text: t, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); i.value = ''; }
    };
    window.mention = n => { const i = $('chat-input'); i.value = `@${n}, ${i.value}`; i.focus(); };
    window.openArchive = () => {
      $('archive-modal').style.display='block';
      db.collection('messages').orderBy('createdAt', 'desc').limit(100).get().then(snap => {
        $('archive-list').innerHTML = snap.docs.map(doc => {
          const m = doc.data(); return `<div style="padding:5px; border-bottom:1px solid #222;"><b>${m.name}:</b> ${m.text}</div>`;
        }).join('');
      });
    };
    window.closeArchive = () => $('archive-modal').style.display='none';

    // ==========================================
    // ЛОГИКА ГЕЙМПЛЕЯ
    // ==========================================
    function init() { 
      S = {
        totalHours: 8, hp: 100, food: 80, water: 80, energy: 100, psy: 100, rad: 0, loc: 'home', weatherId: 0,
        wood: 2, rags: 2, scrap: 0, coal: 0, herbs: 0, berries: 0, mushrooms: 0, raw_fish: 0, dirty_water: 0, filter: 0, flask: 3 
      }; 
    }

    function processTick(hours, isSafe = false) {
      const w = window.GAME_EVENTS.weather[S.weatherId];
      const h = (8 + S.totalHours) % 24;
      const ph = (h < 6) ? window.GAME_EVENTS.dayPhases.night : (h < 12) ? window.GAME_EVENTS.dayPhases.morning : (h < 18) ? window.GAME_EVENTS.dayPhases.day : window.GAME_EVENTS.dayPhases.evening;
      
      let costM = w.mults.cost;
      let radA = w.mults.rad;
      let psyA = w.mults.psy + ph.mults.psy;

      if (isSafe) { costM = 0.5; radA = 0; psyA = +2; } // В убежище статы падают медленнее

      for(let i=0; i<hours; i++) {
        S.food = Math.max(0, S.food - (1.5 * costM));
        S.water = Math.max(0, S.water - (2 * costM));
        S.energy = Math.max(0, S.energy - (3 * costM));
        S.psy = Math.min(100, Math.max(0, S.psy + psyA));
        S.rad = Math.min(100, S.rad + radA);
        S.totalHours++;
      }
      
      // Урон от критических состояний
      if (S.food <= 0) S.hp -= hours * 2;
      if (S.water <= 0) S.hp -= hours * 3;
      if (S.rad > 50) S.hp -= hours * 1;
      
      S.hp = Math.max(0, S.hp);
      if (S.hp <= 0) { log("💀 Вы погибли. Зона забрала еще одного...", "bad"); window.resetGame(); }
    }

    window.ui = function() {
      if(!S) return;
      const loc = window.WORLD[S.loc];
      const date = new Date(1988, 11, 26, 8 + S.totalHours);
      const h = date.getHours();
      const ph = (h < 6) ? window.GAME_EVENTS.dayPhases.night : (h < 12) ? window.GAME_EVENTS.dayPhases.morning : (h < 18) ? window.GAME_EVENTS.dayPhases.day : window.GAME_EVENTS.dayPhases.evening;
      
      $('display-date').textContent = date.toLocaleDateString('ru-RU');
      $('display-time').textContent = (h < 10 ? '0'+h : h) + ':00';
      $('display-phase').textContent = ph.n;
      $('display-weather').textContent = window.GAME_EVENTS.weather[S.weatherId].n;
      $('cur-loc-name').textContent = loc.n;
      $('loc-img').style.backgroundImage = `url('${loc.img}')`;
      
      // Вызов случайного сообщения радио
      $('radio-display').textContent = window.getRandomRadioMessage(); 
      
      $('stats').innerHTML = [['❤️', S.hp], ['🍞', S.food], ['💧', S.water], ['⚡', S.energy], ['🧠', S.psy], ['☢️', S.rad]].map(s=>`<div class="s-item"><span>${s[0]}</span><span class="s-val">${Math.floor(s[1])}</span></div>`).join('');
      
      // Инвентарь с Tooltips
      let inv = S.flask > 0 
        ? `<span class="inv-item inv-clickable" title="Фляга с чистой водой" style="color:#6cf;" onclick="doAction('use_flask')">🍶 Фляга (${S.flask}/3)</span>` 
        : `<span class="inv-item" title="Пустая фляга" style="color:#555;">🍶 Фляга (Пусто)</span>`;
        
      const items = [
        {id:'raw_fish', ic:'🐟', name:'Сырая рыба'}, {id:'dirty_water', ic:'🪣', name:'Грязная вода'}, 
        {id:'wood', ic:'🪵', name:'Дрова'}, {id:'rags', ic:'🧵', name:'Ветошь'}, 
        {id:'scrap', ic:'⚙️', name:'Металлолом'}, {id:'coal', ic:'⬛', name:'Уголь'}, 
        {id:'herbs', ic:'🌿', name:'Травы'}, {id:'berries', ic:'🫐', name:'Ягоды'}, 
        {id:'mushrooms', ic:'🍄', name:'Грибы'}, {id:'filter', ic:'🛢️', name:'Фильтр'}
      ];
      inv += items.map(i => S[i.id] > 0 ? `<span class="inv-item" title="${i.name}">${i.ic} ${S[i.id]}</span>` : '').join(' ');
      $('inventory').innerHTML = inv;

      // Крафт
      let cr = '';
      Object.entries(window.RECIPES.simple).forEach(([id, r]) => { 
        cr += `<button ${!canCraft(id,'simple')?'disabled':''} onclick="applyRecipe('${id}','simple')">
                 <div>${r.n}</div>
                 <span class="craft-cost">Нужно: ${getRecipeCostHTML(r.res)}</span>
               </button>`; 
      });
      if (S.loc === 'home') {
        Object.entries(window.RECIPES.advanced).forEach(([id, r]) => { 
          cr += `<button ${!canCraft(id,'advanced')?'disabled':''} onclick="applyRecipe('${id}','advanced')">
                   <div>${r.n}</div>
                   <span class="craft-cost">Нужно: ${getRecipeCostHTML(r.res)}</span>
                 </button>`; 
        });
      } else {
          cr += `<div style="grid-column:1/-1; font-size:9px; color:#444; text-align:center; padding: 5px;">[ Продвинутый крафт доступен в Убежище ]</div>`;
      }
      $('cook-actions').innerHTML = cr;

      // Действия
      $('local-actions').innerHTML = Object.entries(loc.acts).map(([id, n])=>`<button onclick="doAction('${id}')">${n}</button>`).join('');
      $('move-actions').innerHTML = Object.keys(window.WORLD).map(id=>`<button ${id===S.loc?'disabled':''} onclick="moveTo('${id}')">${window.WORLD[id].n}</button>`).join('');
    };

    window.doAction = function(a) {
      if (a === 'use_flask') { if (S.flask > 0) { S.flask--; S.water = Math.min(100, S.water + 35); log("💧 Сделал глоток чистой воды."); } ui(); save(); return; }
      if (a === 'rest') { if (S.energy >= 95) { log("💤 Вы не хотите спать."); return; } processTick(Math.ceil((100-S.energy)/10), true); S.energy=100; log("💤 Сон восстановил силы."); ui(); save(); return; }
      if (a === 'radio') { processTick(1, true); S.psy = Math.min(100, S.psy+15); log("📻 Послушал шум эфира."); ui(); save(); return; }

      processTick(1, false);
      const w = window.GAME_EVENTS.weather[S.weatherId];
      const h = (8 + S.totalHours) % 24;
      const ph = (h < 6) ? window.GAME_EVENTS.dayPhases.night : (h < 12) ? window.GAME_EVENTS.dayPhases.morning : (h < 18) ? window.GAME_EVENTS.dayPhases.day : window.GAME_EVENTS.dayPhases.evening;
      
      const scavengeChance = w.mults.scavenge * ph.mults.scavenge;

      if (a === 'burn_coal') { 
          if (S.wood >= 2) { S.wood -= 2; S.coal++; log("🔥 Выжег древесный уголь."); } 
          else { log("⚠️ Не хватает дров.", "bad"); }
      } else {
        if (Math.random() < scavengeChance || a === 'get_wood' || a === 'get_water') {
          if(a==='scavenge_rags') { S.rags++; log("🧵 Нашел старую ветошь."); }
          else if(a==='get_wood') { S.wood+=2; log("🪵 Нарубил дров."); }
          else if(a==='fish') { S.raw_fish++; log("🐟 Поймал рыбу."); }
          else if(a==='get_water') { S.dirty_water+=2; log("🪣 Набрал грязной воды."); }
          else if(a==='scavenge_scrap') { S.scrap++; log("⚙️ Нашел металлолом."); }
          else if(a==='forage_herbs') { if(Math.random()>0.5){S.herbs++;} else {S.berries++;} log("🌿 Нашел коренья/ягоды."); }
          else if(a==='forage_mushrooms') { S.mushrooms++; S.rad+=5; log("🍄 Собрал фонящие грибы."); }
          else if(a==='search_ruins' || a==='stalking') { 
              S.scrap+=2; 
              if(Math.random()>0.7) { S.filter++; log("📦 Чудо! Нашел рабочий фильтр."); }
              else log("📦 Рискованный поиск принес плоды."); 
          }
        } else {
            log("💨 Пусто. Поиск ничего не дал.", "bad");
        }
      }
      
      if(Math.random() < 0.15) S.weatherId = Math.floor(Math.random()*window.GAME_EVENTS.weather.length);
      ui(); save();
    };

    window.moveTo = id => { if(S.energy < 15) return; S.loc=id; processTick(3, false); log(`➡️ Переход в ${window.WORLD[id].n}`); ui(); save(); };
    
    window.applyRecipe = (id, cat) => {
      const r = window.RECIPES[cat][id]; if(!canCraft(id, cat)) return;
      Object.entries(r.res).forEach(([k, v]) => S[k]-=v);
      if(r.items) Object.entries(r.items).forEach(([k, v]) => S[k]+=v);
      if(r.gain) { S.food=Math.min(100,S.food+(r.gain.food||0)); S.hp=Math.min(100,S.hp+(r.gain.hp||0)); S.psy=Math.min(100,S.psy+(r.gain.psy||0)); S.water=Math.min(100,S.water+(r.gain.water||0)); S.rad=Math.max(0,S.rad+(r.gain.rad||0)); }
      if(r.custom) r.custom(S); 
      processTick(1, S.loc==='home'); log(r.log); ui(); save();
    };

    window.log = (m, t='') => $('log').insertAdjacentHTML('afterbegin', `<div class="${t}">[${Math.floor(S.totalHours/24)}д] ${m}</div>`);
    window.save = () => { if(currentUser && S) db.collection('survival_v12').doc(currentUser.uid).set({S}); };
    window.resetGame = () => { if(confirm("Начать заново?")) { init(); ui(); save(); } };

    auth.onAuthStateChanged(user => {
      if(user) {
        currentUser = user; $('user-info').style.display='block'; $('login-btn').style.display='none';
        const sn = localStorage.getItem('zone_nick'); if (sn) $('nick-input').value = sn;
        db.collection('survival_v12').doc(user.uid).get().then(d => {
          if(d.exists) S=d.data().S; else init();
          // Проверка переменных
          if (S.coal === undefined) { S.coal = 0; S.herbs = 0; S.berries = 0; S.mushrooms = 0; S.filter = 0; S.flask = 3; }
          ui(); startChat();
        });
      }
    });

    $('chat-send').onclick = window.sendChatMsg;
    $('chat-input').onkeypress = e => { if(e.key==='Enter') window.sendChatMsg(); };
    $('nick-input').onchange = e => { localStorage.setItem('zone_nick', e.target.value); startChat(); };
    $('login-btn').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
  </script>
</body>
</html>
